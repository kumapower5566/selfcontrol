<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffecd2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>你能行 - 专注时钟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      overscroll-behavior-x: none;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #faf9fb;
      color: #333;
      /* 底部导航栏高度 */
      padding-bottom: 72px;
    }

    /* ===== 顶部标题区 ===== */
    .header {
      text-align: center;
      padding: 52px 20px 20px;
      background: #faf9fb;
    }

    .header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 2px;
    }

    .header p {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 5px;
    }

    /* ===== 页面切换容器 ===== */
    .page {
      display: none;
      padding: 0 16px 20px;
      animation: pageIn 0.3s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== 卡片通用 ===== */
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 22px 20px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: #999;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== 专注时钟页面 ===== */
    .timer-card {
      background: linear-gradient(145deg, #ffecd2 0%, #fcb69f 100%);
      position: relative;
      overflow: hidden;
      padding: 28px 20px;
    }

    .timer-card::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -30%;
      width: 80%;
      height: 80%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    .timer-display {
      text-align: center;
      padding: 10px 0 20px;
      position: relative;
      z-index: 1;
    }

    /* 大字号：自动撑满卡片宽度 */
    .timer-time {
      font-size: clamp(4.5rem, 22vw, 7rem);
      font-weight: 700;
      color: #5a4a3a;
      font-variant-numeric: tabular-nums;
      letter-spacing: 4px;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .timer-status {
      font-size: 1rem;
      color: #8a7a6a;
      margin-top: 10px;
    }

    .timer-presets {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 22px;
      position: relative;
      z-index: 1;
    }

    .preset-btn {
      flex: 1;
      padding: 12px 0;
      border-radius: 20px;
      border: none;
      background: rgba(255,255,255,0.7);
      color: #6a5a4a;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
      font-family: inherit;
    }

    .preset-btn.active {
      background: #fff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .timer-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .btn {
      flex: 1;
      padding: 16px 0;
      border-radius: 50px;
      border: none;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.85);
      color: #666;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:active {
      transform: scale(0.97);
    }

    /* ===== 任务页面 ===== */
    .task-input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .task-input {
      flex: 1;
      padding: 14px 16px;
      border-radius: 16px;
      border: 2px solid #f0f0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      min-width: 0;
    }

    .task-input:focus {
      border-color: #fcb69f;
    }

    .add-btn {
      padding: 14px 18px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      color: #6a5a4a;
      font-weight: 600;
      cursor: pointer;
      font-size: 1.3rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .add-btn:active {
      transform: scale(0.95);
    }

    .task-list {
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      background: #faf9fb;
      transition: all 0.2s;
    }

    .task-item.completed {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #999;
    }

    .task-checkbox {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #ddd;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: white;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .task-item.completed .task-checkbox {
      background: #4caf50;
      border-color: #4caf50;
    }

    .task-text {
      flex: 1;
      font-size: 0.97rem;
      color: #444;
      min-width: 0;
      word-break: break-word;
    }

    .task-delete {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1.4rem;
      padding: 4px 6px;
      transition: color 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .task-delete:active {
      color: #ff5252;
    }

    /* ===== 日历页面 ===== */
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .calendar-month {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .calendar-nav button {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: #f5f4f7;
      cursor: pointer;
      font-size: 1.2rem;
      color: #666;
      transition: all 0.2s;
      font-family: inherit;
    }

    .calendar-nav button:active {
      background: #eee;
      transform: scale(0.95);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .calendar-day-name {
      text-align: center;
      font-size: 0.78rem;
      color: #bbb;
      padding: 7px 0;
      font-weight: 500;
    }

    .calendar-day {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
    }

    .calendar-day.today {
      font-weight: 700;
      color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    .calendar-day.checked {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 600;
    }

    .calendar-day.empty {
      cursor: default;
    }

    .calendar-day.future {
      color: #ccc;
      cursor: not-allowed;
    }

    /* ===== 心情页面 ===== */
    .mood-selector {
      display: flex;
      justify-content: space-around;
      gap: 8px;
    }

    .mood-btn {
      flex: 1;
      padding: 14px 4px;
      border-radius: 16px;
      border: 2px solid transparent;
      background: #faf9fb;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
    }

    .mood-btn.selected {
      border-color: #fcb69f;
      background: linear-gradient(135deg, #fff5f0 0%, #ffe4d6 100%);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(252, 182, 159, 0.3);
    }

    .mood-emoji {
      font-size: 1.8rem;
      margin-bottom: 4px;
      display: block;
    }

    .mood-label {
      font-size: 0.72rem;
      color: #999;
    }

    /* ===== 统计页面 ===== */
    .stats-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .stats-card .card-title {
      color: rgba(255,255,255,0.75);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-item {
      text-align: center;
      padding: 16px 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: white;
    }

    .stat-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.8);
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: #bbb;
      font-size: 0.9rem;
    }

    /* ===== 底部导航栏 ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: stretch;
      z-index: 999;
      /* 安全区域（iPhone 底部刘海） */
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      gap: 4px;
      border: none;
      background: none;
      padding: 8px 0 0;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item:active {
      transform: scale(0.92);
    }

    .nav-icon {
      font-size: 1.5rem;
      line-height: 1;
      transition: transform 0.2s;
    }

    .nav-label {
      font-size: 0.68rem;
      color: #bbb;
      transition: color 0.2s;
      font-weight: 500;
    }

    .nav-item.active .nav-icon {
      transform: translateY(-2px);
    }

    .nav-item.active .nav-label {
      color: #667eea;
      font-weight: 700;
    }

    /* 激活时图标下方加点 */
    .nav-item.active::after {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #667eea;
      position: absolute;
      bottom: calc(4px + env(safe-area-inset-bottom));
    }

    .nav-item {
      position: relative;
    }
  </style>
</head>
<body>

  <!-- 顶部 -->
  <div class="header">
    <h1>你能行</h1>
    <p>专注当下，遇见更好的自己</p>
  </div>

  <!-- ===== 专注时钟页面 ===== -->
  <div class="page active" id="page-timer">
    <div class="card timer-card">
      <div class="timer-display">
        <div class="timer-time" id="timerDisplay">25:00</div>
        <div class="timer-status" id="timerStatus">准备开始专注</div>
      </div>
      <div class="timer-presets">
        <button class="preset-btn active" data-minutes="25">25分钟</button>
        <button class="preset-btn" data-minutes="45">45分钟</button>
        <button class="preset-btn" data-minutes="60">60分钟</button>
      </div>
      <div class="timer-buttons">
        <button class="btn btn-primary" id="startBtn">开始</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
      </div>
    </div>
  </div>

  <!-- ===== 今日任务页面 ===== -->
  <div class="page" id="page-task">
    <div class="card">
      <div class="card-title">📝 今日任务</div>
      <div class="task-input-wrap">
        <input type="text" class="task-input" id="taskInput" placeholder="添加新任务...">
        <button class="add-btn" id="addTaskBtn">+</button>
      </div>
      <ul class="task-list" id="taskList"></ul>
    </div>
  </div>

  <!-- ===== 打卡日历页面 ===== -->
  <div class="page" id="page-calendar">
    <div class="card">
      <div class="card-title">📅 打卡日历</div>
      <div class="calendar-header">
        <span class="calendar-month" id="calendarMonth"></span>
        <div class="calendar-nav">
          <button id="prevMonth">‹</button>
          <button id="nextMonth">›</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <!-- ===== 心情记录页面 ===== -->
  <div class="page" id="page-mood">
    <div class="card">
      <div class="card-title">💕 今日心情</div>
      <div class="mood-selector" id="moodSelector">
        <div class="mood-btn" data-mood="terrible"><span class="mood-emoji">😫</span><div class="mood-label">很差</div></div>
        <div class="mood-btn" data-mood="bad"><span class="mood-emoji">😔</span><div class="mood-label">较差</div></div>
        <div class="mood-btn" data-mood="normal"><span class="mood-emoji">😐</span><div class="mood-label">一般</div></div>
        <div class="mood-btn" data-mood="good"><span class="mood-emoji">🙂</span><div class="mood-label">不错</div></div>
        <div class="mood-btn" data-mood="great"><span class="mood-emoji">😄</span><div class="mood-label">超棒</div></div>
      </div>
    </div>
  </div>

  <!-- ===== 统计页面 ===== -->
  <div class="page" id="page-stats">
    <div class="card stats-card">
      <div class="card-title">✨ 本周成就</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="totalFocus">0</div>
          <div class="stat-label">专注(分钟)</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="completedTasks">0</div>
          <div class="stat-label">已完成</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="checkInDays">0</div>
          <div class="stat-label">打卡天数</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 底部导航栏 ===== -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="timer">
      <span class="nav-icon">⏱️</span>
      <span class="nav-label">专注</span>
    </button>
    <button class="nav-item" data-page="task">
      <span class="nav-icon">✅</span>
      <span class="nav-label">任务</span>
    </button>
    <button class="nav-item" data-page="calendar">
      <span class="nav-icon">📅</span>
      <span class="nav-label">打卡</span>
    </button>
    <button class="nav-item" data-page="mood">
      <span class="nav-icon">💕</span>
      <span class="nav-label">心情</span>
    </button>
    <button class="nav-item" data-page="stats">
      <span class="nav-icon">✨</span>
      <span class="nav-label">统计</span>
    </button>
  </nav>

  <script>
    // ===== 底部导航切换 =====
    const navItems = document.querySelectorAll('.nav-item');
    const pages = document.querySelectorAll('.page');

    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const targetPage = item.dataset.page;

        navItems.forEach(n => n.classList.remove('active'));
        pages.forEach(p => p.classList.remove('active'));

        item.classList.add('active');
        document.getElementById('page-' + targetPage).classList.add('active');

        // 切换到对应页面时刷新数据
        if (targetPage === 'calendar') renderCalendar();
        if (targetPage === 'mood') renderMood();
        if (targetPage === 'stats') updateStats();
        if (targetPage === 'task') renderTasks();
      });
    });

    // ===== 数据存储 =====
    const DATA_KEY = 'focus_clock_data_v2';

    function loadData() {
      const data = localStorage.getItem(DATA_KEY);
      return data ? JSON.parse(data) : {
        tasks: [],
        checkins: {},
        moods: {},
        focusLogs: []
      };
    }

    function saveData(data) {
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
    }

    // ===== 计时器 =====
    let timerInterval = null;
    let remainingSeconds = 25 * 60;
    let isRunning = false;
    let currentPreset = 25;

    const timerDisplay = document.getElementById('timerDisplay');
    const timerStatus = document.getElementById('timerStatus');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const presetBtns = document.querySelectorAll('.preset-btn');

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
      timerDisplay.textContent = formatTime(remainingSeconds);
    }

    function startTimer() {
      if (isRunning) {
        clearInterval(timerInterval);
        isRunning = false;
        startBtn.textContent = '继续';
        timerStatus.textContent = '已暂停';
      } else {
        isRunning = true;
        startBtn.textContent = '暂停';
        timerStatus.textContent = '专注中...';

        const startTime = Date.now();
        const initialSeconds = remainingSeconds;

        timerInterval = setInterval(() => {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          remainingSeconds = Math.max(0, initialSeconds - elapsed);
          updateTimerDisplay();

          if (remainingSeconds === 0) {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.textContent = '开始';
            timerStatus.textContent = '太棒了！完成一次专注 🎉';

            const data = loadData();
            data.focusLogs.push({
              date: new Date().toISOString().split('T')[0],
              minutes: currentPreset
            });
            saveData(data);
            updateStats();
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      remainingSeconds = currentPreset * 60;
      updateTimerDisplay();
      startBtn.textContent = '开始';
      timerStatus.textContent = '准备开始专注';
    }

    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        presetBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPreset = parseInt(btn.dataset.minutes);
        resetTimer();
      });
    });

    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);

    // ===== 任务管理 =====
    const taskInput = document.getElementById('taskInput');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const taskList = document.getElementById('taskList');

    function renderTasks() {
      const data = loadData();
      if (data.tasks.length === 0) {
        taskList.innerHTML = '<div class="empty-state">还没有任务，添加一个吧 ✨</div>';
        return;
      }

      taskList.innerHTML = data.tasks.map((task, index) => `
        <li class="task-item ${task.completed ? 'completed' : ''}">
          <div class="task-checkbox" onclick="toggleTask(${index})">${task.completed ? '✓' : ''}</div>
          <span class="task-text">${task.text}</span>
          <button class="task-delete" onclick="deleteTask(${index})">×</button>
        </li>
      `).join('');
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;

      const data = loadData();
      data.tasks.push({ text, completed: false });
      saveData(data);
      taskInput.value = '';
      renderTasks();
      updateStats();
    }

    window.toggleTask = function(index) {
      const data = loadData();
      data.tasks[index].completed = !data.tasks[index].completed;
      saveData(data);
      renderTasks();
      updateStats();
    };

    window.deleteTask = function(index) {
      const data = loadData();
      data.tasks.splice(index, 1);
      saveData(data);
      renderTasks();
      updateStats();
    };

    addTaskBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    // ===== 日历 =====
    let currentMonth = new Date();

    const calendarMonthEl = document.getElementById('calendarMonth');
    const calendarGrid = document.getElementById('calendarGrid');

    function renderCalendar() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const today = new Date();

      calendarMonthEl.textContent = `${year}年 ${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const todayStr = today.toISOString().split('T')[0];

      const data = loadData();

      let html = '';
      ['日', '一', '二', '三', '四', '五', '六'].forEach(d => {
        html += `<div class="calendar-day-name">${d}</div>`;
      });

      for (let i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day empty"></div>';
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = dateStr === todayStr;
        const isChecked = data.checkins[dateStr];
        const isFuture = new Date(dateStr + 'T00:00:00') > today;

        let classes = 'calendar-day';
        if (isToday) classes += ' today';
        if (isChecked) classes += ' checked';
        if (isFuture) classes += ' future';

        const clickHandler = !isFuture ? `onclick="toggleCheckin('${dateStr}')"` : '';

        html += `<div class="${classes}" ${clickHandler}>${d}</div>`;
      }

      calendarGrid.innerHTML = html;
    }

    window.toggleCheckin = function(dateStr) {
      const data = loadData();
      data.checkins[dateStr] = !data.checkins[dateStr];
      saveData(data);
      renderCalendar();
      updateStats();
    };

    document.getElementById('prevMonth').addEventListener('click', () => {
      currentMonth.setMonth(currentMonth.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentMonth.setMonth(currentMonth.getMonth() + 1);
      renderCalendar();
    });

    // ===== 心情 =====
    const moodBtns = document.querySelectorAll('.mood-btn');
    const todayStr = new Date().toISOString().split('T')[0];

    function renderMood() {
      const data = loadData();
      const currentMood = data.moods[todayStr];

      moodBtns.forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.mood === currentMood);
      });
    }

    moodBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const mood = btn.dataset.mood;
        const data = loadData();
        data.moods[todayStr] = mood;
        saveData(data);
        renderMood();
      });
    });

    // ===== 统计 =====
    function updateStats() {
      const data = loadData();

      const weekStart = new Date();
      weekStart.setDate(weekStart.getDate() - weekStart.getDay());
      const weekMinutes = data.focusLogs
        .filter(log => new Date(log.date) >= weekStart)
        .reduce((sum, log) => sum + log.minutes, 0);

      const completedCount = data.tasks.filter(t => t.completed).length;
      const checkinDays = Object.values(data.checkins).filter(Boolean).length;

      document.getElementById('totalFocus').textContent = weekMinutes;
      document.getElementById('completedTasks').textContent = completedCount;
      document.getElementById('checkInDays').textContent = checkinDays;
    }

    // ===== 初始化 =====
    updateTimerDisplay();
    renderTasks();
    renderCalendar();
    renderMood();
    updateStats();
  </script>
</body>
</html>
